services:
  ncclient:
    image: ghcr.io/nixrtr/nebula-commander-ncclient:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host
    restart: unless-stopped
    environment:
      # Base URL of your Nebula Commander backend (including scheme, no trailing slash).
      # Example: https://nc.example.com or http://localhost:8000
      NEBULA_COMMANDER_SERVER: "https://nc.example.com"

      # Enable DNS service for this client. When true, and when this node is a
      # lighthouse, the container will poll Nebula Commander for dnsmasq config
      # and run dnsmasq on the Nebula IP:53. When false or unset, the container
      # does not serve DNS.
      # SERVE_DNS: "true"

      # Numeric Nebula Commander network ID whose DNS config should be served
      # when SERVE_DNS is enabled. Required only if SERVE_DNS is true.
      # NEBULA_NETWORK_ID: "1"

      # How often (in seconds) to poll the dnsmasq config endpoint when this node
      # is a lighthouse. If the config has not changed (ETag / hash matches),
      # no dnsmasq reload occurs. On non-lighthouses, dnsmasq stays disabled.
      NEBULA_DNS_POLL_INTERVAL: "60"

      # Directory where ncclient will write Nebula config.yaml and certs (under the data volume).
      NEBULA_OUTPUT_DIR: "/data/nebula"

      # Path to the device token file used by ncclient to authenticate to Nebula Commander.
      # When the token file does not exist, set ENROLL_CODE (one-time code from the UI) to enroll
      # this client; the token is then written here. If the token file already exists, ENROLL_CODE
      # is ignored.
      NEBULA_DEVICE_TOKEN_FILE: "/data/nebula-commander/token"

      # One-time enrollment code from the Nebula Commander UI (Devices / Add device).
      # Only used when the token file does not exist; ignored once the client is enrolled.
      # ENROLL_CODE: "XXXXXXXX"

    volumes:
      - ncclient-data:/data

volumes:
  ncclient-data:
    driver: local

